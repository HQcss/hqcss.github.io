<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- HQ js-css -->
    <link rel="stylesheet" href="plugin/HQ/hq-css.css">
    <script src="plugin/HQ/hq-js.js"></script>
    <!-- bootstrap 4 -->
    <link rel="stylesheet" href="plugin/Bootstrap/Boootstrap5-1_w3-school/css/bootstrap5.min.css">
    <script src="plugin/Bootstrap/Boootstrap5-1_w3-school/js/bootstrap.min.js"></script>
    <script src="plugin/Bootstrap/Boootstrap5-1_w3-school/js/jquery.min.js"></script>
    <script src="plugin/Bootstrap/Boootstrap5-1_w3-school/js/popper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- icon -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <!-- Js chuyển động -->
    <script src="plugin/jquery.easing.1.3/jquery.easing.1.3.js"></script>
    <title>Box reg - box login</title>
</head>

<body>
    <!-- 1.box đăng nhập đăng ký -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 reset-col">
                <h5 class="topic">Demo HQ-Js </h5>
            </div>
            <div class="col-3 reset-col">
                <h5 class="title-setting">1. Box đăng nhập</h5>
                <div class="quote">
                    <span>Click button <span class="note">đăng nhập</span> hoặc <span class="note">đăng ký</span> để test hiệu ứng</span>
                </div>
                <div class="download-code">
                    <a href="1.html" class="source-code" target="_blank" download="abc"> Copy code HTML</a>
                </div>
            </div>
            <div class="col-9 reset-col">

                <div class="content-reg-login">

                    <div class="box-login">
                        <h6 class="title-login">Đăng nhập</h6>
                        <div class="img-reg " style="background-image: url(img/image9.jpg);"></div>
                        <div class="form-reg">
                            <form action="">
                                <div class="form-group">
                                    <label for="email">Tên đăng nhập :</label>
                                    <input type="text" class="form-control" placeholder="Enter email" id="ten">
                                </div>
                                <div class="form-group">
                                    <label for="pwd">Password:</label>
                                    <input type="password" class="form-control" placeholder="Enter password" id="pwd">
                                </div>
                                <div class="form-group form-check">
                                    <label class="form-check-label">
        <input class="form-check-input" type="checkbox"> Remember me
      </label>
                                </div>
                                <button type="submit" class="btn btn-setting ">Đăng Nhập</button>
                                <button type="button" class="btn btn-setting special btn_dangky">Đăng Ký</button>
                            </form>
                        </div>
                    </div>
                    <div class="box-reg">
                        <h6 class="title-reg">Đăng ký</h6>
                        <div class="img-reg " style="background-image: url(img/image1.jpg);"></div>
                        <div class="form-reg">
                            <form action="">
                                <div class="form-group">
                                    <label for="email">Tên đăng ký :</label>
                                    <input type="text" class="form-control" placeholder="Enter email" id="ten">
                                </div>
                                <div class="form-group">
                                    <label for="pwd">Password:</label>
                                    <input type="password" class="form-control" placeholder="Enter password" id="pwd">
                                </div>
                                <div class="form-group">
                                    <label for="pwd">Nhập lại password:</label>
                                    <input type="password" class="form-control" placeholder="Enter password" id="pwd">
                                </div>

                                <button type="submit" class="btn btn-setting">Đăng Ký</button>
                                <button type="button" class="btn btn-setting btn_dangnhap special">Đăng Nhập</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
